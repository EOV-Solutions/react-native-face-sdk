buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

android {
    namespace "com.eov.reactnative.facesdk"
    compileSdkVersion safeExtGet('compileSdkVersion', 34)
    
    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 23)
        targetSdkVersion safeExtGet('targetSdkVersion', 34)
        versionCode 1
        versionName "1.0.0"
    }
    
    buildTypes {
        release {
            minifyEnabled false
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    
    kotlinOptions {
        jvmTarget = '17'
    }
    
    sourceSets {
        main {
            java.srcDirs = ['src/main/java']
        }
    }
    
    // Ensure native libraries are extracted (required for App Bundle distribution)
    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        // Prevent duplicate .so files if multiple dependencies have same libraries
        pickFirst '**/libc++_shared.so'
    }
}

repositories {
    google()
    mavenCentral()
    maven {
        // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
        url "$rootDir/../node_modules/react-native/android"
    }
}

// Automatically add this module's libs folder to the app's repositories
// so the consuming app can resolve the SDK AAR automatically.
rootProject.allprojects {
    repositories {
        flatDir {
            dirs project(':react-native-face-sdk').file('libs')
        }
    }
}

dependencies {
    // React Native
    implementation "com.facebook.react:react-android"
    
    // Face SDK (AAR)
    implementation(name: 'facekit-release', ext: 'aar')
    
    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    
    // Material Design 3 (required for FaceSDK UI themes)
    implementation 'com.google.android.material:material:1.11.0'
    
    // Camera2 (CameraX) - Use 1.4.1+ for 16KB page alignment support (Android 15+)
    implementation 'androidx.camera:camera-core:1.4.1'
    implementation 'androidx.camera:camera-camera2:1.4.1'
    implementation 'androidx.camera:camera-lifecycle:1.4.1'
    implementation 'androidx.camera:camera-view:1.4.1'
    
    // Kotlin
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
}
